<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment | Clear Vision Eye Hospital</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/animation.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-header { background: var(--dark-blue); color: white; padding: 100px 0 60px; text-align: center; }
    </style>
</head>
<body style="background: var(--background);">
    <!-- Back Button -->
    <a href="javascript:history.back()" class="floating-back-btn">
        <i class="fas fa-arrow-left"></i> Back
    </a>

    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo"><i class="fas fa-eye"></i> Clear Vision</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="services.html">Services</a>
                <a href="doctors.html">Doctors</a>
                <a href="technology.html">Technology</a>
                <a href="gallery.html">Gallery</a>
                <a href="contact.html">Contact</a>
                <a href="appointment.html" class="active btn btn-primary pulse-button" style="color:white; margin-left:15px;">Book Appointment</a>
            </div>
            <div class="mobile-menu-btn"><i class="fas fa-bars"></i></div>
        </div>
    </nav>

    <div class="page-header reveal-up">
        <div class="container">
            <h1>Book an Appointment</h1>
            <p>Schedule your consultation with our expert eye specialists.</p>
        </div>
    </div>

    <section class="section container" style="max-width: 800px;">
        <form id="home-appointment-form" class="reveal-up" style="background: white; padding: 40px; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);">
            <div class="grid grid-2" style="gap: 20px; margin-bottom: 20px;">
                <div class="form-group">
                    <label style="font-weight: 500; margin-bottom: 8px; display: block;">Full Name</label>
                    <input type="text" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label style="font-weight: 500; margin-bottom: 8px; display: block;">Mobile Number</label>
                    <input type="tel" class="form-control" placeholder="+91 98765 43210" required>
                </div>
            </div>
            
            <div class="grid grid-2" style="gap: 20px; margin-bottom: 20px;">
                <div class="form-group">
                    <label style="font-weight: 500; margin-bottom: 8px; display: block;">Select Service</label>
                    <select class="form-control" required>
                        <option value="">Choose...</option>
                        <option value="cataract">Cataract Surgery</option>
                        <option value="lasik">LASIK</option>
                        <option value="consultation">General Consultation</option>
                    </select>
                </div>
                <div class="form-group">
                    <label style="font-weight: 500; margin-bottom: 8px; display: block;">Select Doctor (Optional)</label>
                    <select class="form-control">
                        <option value="">Any Available Doctor</option>
                        <option value="dr-arvind">Dr. Arvind Kumar</option>
                        <option value="dr-priya">Dr. Priya Natarajan</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-2" style="gap: 20px; margin-bottom: 30px;">
                <div class="form-group">
                    <label style="font-weight: 500; margin-bottom: 8px; display: block;">Preferred Date</label>
                    <input type="date" class="form-control" required>
                </div>
                <div class="form-group">
                    <label style="font-weight: 500; margin-bottom: 8px; display: block;">Preferred Time</label>
                    <input type="time" class="form-control" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 15px;">Confirm Booking <i class="fas fa-check-circle"></i></button>
        </form>
    </section>

    <!-- Footer -->
    <footer style="background: var(--dark-blue); color: white; padding: 40px 0;">
        <div class="container" style="text-align: center;">&copy; 2026 Clear Vision Eye Hospital.</div>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/animation.js"></script>
    <script src="js/appointment.js"></script>
    <!-- Mobile Bottom Navigation -->
    <div class="mobile-bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="vision-test.html" class="nav-item">
            <i class="fas fa-eye"></i>
            <span>Test</span>
        </a>
        <a href="appointment.html" class="nav-item active">
            <i class="far fa-calendar-alt"></i>
            <span>Book</span>
        </a>
        <a href="tel:+919876543210" class="nav-item">
            <i class="fas fa-phone-alt"></i>
            <span>Call</span>
        </a>
    </div>
</body>
</html>
