<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Clear Vision Eye Hospital</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/animation.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-header { background: var(--dark-blue); color: white; padding: 100px 0 60px; text-align: center; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .gallery-item { border-radius: var(--radius-md); overflow: hidden; height: 250px; cursor: pointer; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform var(--transition-smooth); }
        .gallery-item:hover img { transform: scale(1.1); }
    </style>
</head>
<body>
    <!-- Back Button -->
    <a href="javascript:history.back()" class="floating-back-btn">
        <i class="fas fa-arrow-left"></i> Back
    </a>

    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo"><i class="fas fa-eye"></i> Clear Vision</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="services.html">Services</a>
                <a href="doctors.html">Doctors</a>
                <a href="technology.html">Technology</a>
                <a href="gallery.html" class="active">Gallery</a>
                <a href="contact.html">Contact</a>
                <a href="appointment.html" class="btn btn-primary pulse-button" style="color:white; margin-left:15px;">Book Appointment</a>
            </div>
            <div class="mobile-menu-btn"><i class="fas fa-bars"></i></div>
        </div>
    </nav>

    <div class="page-header reveal-up">
        <div class="container">
            <h1>Photo Gallery</h1>
            <p>Take a tour of our world-class facilities and infrastructure.</p>
        </div>
    </div>

    <section class="section container">
        <div class="gallery-grid">
            <div class="gallery-item reveal-up"><img src="https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=600&q=80" alt="Hospital Front"></div>
            <div class="gallery-item reveal-up" style="transition-delay: 0.1s;"><img src="https://images.unsplash.com/photo-1579684385127-1ef15d508118?auto=format&fit=crop&w=600&q=80" alt="Operating Room"></div>
            <div class="gallery-item reveal-up" style="transition-delay: 0.2s;"><img src="https://images.unsplash.com/photo-1530497610245-94d3c16cda28?auto=format&fit=crop&w=600&q=80" alt="Reception Area"></div>
            <div class="gallery-item reveal-up"><img src="https://images.unsplash.com/photo-1551076805-e1869033e561?auto=format&fit=crop&w=600&q=80" alt="Patient Room"></div>
            <div class="gallery-item reveal-up" style="transition-delay: 0.1s;"><img src="https://images.unsplash.com/photo-1581594693702-fbdc51b2763b?auto=format&fit=crop&w=600&q=80" alt="Consultation Room"></div>
            <div class="gallery-item reveal-up" style="transition-delay: 0.2s;"><img src="https://images.unsplash.com/photo-1579684453423-f84349ef60b0?auto=format&fit=crop&w=600&q=80" alt="Equipment"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer style="background: var(--dark-blue); color: white; padding: 40px 0;">
        <div class="container" style="text-align: center;">&copy; 2026 Clear Vision Eye Hospital.</div>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/animation.js"></script>
    <!-- Mobile Bottom Navigation -->
    <div class="mobile-bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="vision-test.html" class="nav-item">
            <i class="fas fa-eye"></i>
            <span>Test</span>
        </a>
        <a href="appointment.html" class="nav-item">
            <i class="far fa-calendar-alt"></i>
            <span>Book</span>
        </a>
        <a href="tel:+919876543210" class="nav-item">
            <i class="fas fa-phone-alt"></i>
            <span>Call</span>
        </a>
    </div>
</body>
</html>
